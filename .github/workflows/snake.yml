name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Misagh95
          outputs: |
            https://raw.githubusercontent.com/Misagh95/Misagh95/output/github-contribution-grid-snake.svg
            https://raw.githubusercontent.com/Misagh95/Misagh95/output/github-contribution-grid-snake-dark.svg?palette=github-dark